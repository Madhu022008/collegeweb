<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Student Registration</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
    }

    .form-box{
      width:450px;
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    .form-box h2{
      text-align:center;
      margin-bottom:30px;
      color:#6a0dad;
      font-size:32px;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box select,
    .input-box textarea{

      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      background:#8a2be2;
      color:white;
      font-size:18px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#5d0ca8;
    }

    .back{
      display:block;
      text-align:center;
      margin-top:20px;
      text-decoration:none;
      color:#6a0dad;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="form-box">

    <h2>Student Registration</h2>

    <form>

      <div class="input-box">
        <input type="text" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="tel" placeholder="Mobile Number" required>
      </div>

      <div class="input-box">

        <select required>

          <option>Select Course</option>
          <option>B.Tech</option>
          <option>MBBS</option>
          <option>BCA</option>
          <option>BBA</option>
          <option>MBA</option>

        </select>

      </div>

      <div class="input-box">
        <textarea rows="4" placeholder="Address"></textarea>
      </div>

      <button class="btn">
        Register Now
      </button>

    </form>

    <a href="index.html" class="back">
      ← Back to Home
    </a>

  </div>

</body>
</html>
